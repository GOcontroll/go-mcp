name: Build and publish go-mcp package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-mcp-server
          ARCH=arm64
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" "${DIST}"

          # --- Source files -------------------------------------------------------
          install -Dm644 server.js    "${BUILD}/opt/gocontroll/go-mcp/server.js"
          install -Dm644 package.json "${BUILD}/opt/gocontroll/go-mcp/package.json"
          for f in lib/*.js; do
            install -Dm644 "$f" "${BUILD}/opt/gocontroll/go-mcp/lib/$(basename "$f")"
          done

          # --- Systemd service ----------------------------------------------------
          mkdir -p "${BUILD}/lib/systemd/system"
          cat > "${BUILD}/lib/systemd/system/go-mcp-server.service" << 'EOF'
          [Unit]
          Description=GOcontroll Moduline MCP API Service
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/gocontroll/go-mcp
          ExecStart=/usr/bin/node server.js
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          EOF

          # --- Avahi mDNS ---------------------------------------------------------
          mkdir -p "${BUILD}/etc/avahi/services"
          cat > "${BUILD}/etc/avahi/services/go-mcp-server.service" << 'EOF'
          <?xml version="1.0" standalone='no'?>
          <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
          <service-group>
            <name replace-wildcards="yes">GOcontroll %h</name>
            <service>
              <type>_gocontroll-mcp._tcp</type>
              <port>8080</port>
              <txt-record>model=Moduline IV</txt-record>
              <txt-record>api=v1</txt-record>
            </service>
          </service-group>
          EOF

          # --- DEBIAN/control -----------------------------------------------------
          cat > "${BUILD}/DEBIAN/control" << EOF
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Depends: nodejs (>= 18), mosquitto, avahi-daemon
          Recommends: gcc, make, binutils
          Section: net
          Priority: optional
          Homepage: https://gocontroll.com
          Description: GOcontroll Moduline MCP API Service
           HTTP API service that exposes GOcontroll Moduline IV hardware via a
           REST/JSON interface for use with the MCP (Model Context Protocol) and
           Claude AI. Provides hardware discovery, I/O monitoring, C-code
           compilation, CAN/MQTT tools, and XCP/HANtune a2l generation.
          EOF

          # --- DEBIAN/postinst ----------------------------------------------------
          cat > "${BUILD}/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          set -e
          case "$1" in
              configure)
                  # Migrate from old service name if still present
                  if systemctl is-active --quiet gocontroll-mcp.service 2>/dev/null; then
                      systemctl stop gocontroll-mcp.service || true
                  fi
                  systemctl disable gocontroll-mcp.service 2>/dev/null || true
                  rm -f /lib/systemd/system/gocontroll-mcp.service
                  rm -f /etc/avahi/services/gocontroll-mcp.service

                  systemctl daemon-reload
                  systemctl enable go-mcp-server.service
                  systemctl restart go-mcp-server.service || true
                  systemctl is-active --quiet avahi-daemon \
                    && systemctl restart avahi-daemon || true
                  ;;
          esac
          EOF
          chmod 755 "${BUILD}/DEBIAN/postinst"

          # --- DEBIAN/prerm -------------------------------------------------------
          cat > "${BUILD}/DEBIAN/prerm" << 'EOF'
          #!/bin/bash
          set -e
          case "$1" in
              remove|purge)
                  systemctl stop go-mcp-server.service || true
                  systemctl disable go-mcp-server.service || true
                  ;;
          esac
          EOF
          chmod 755 "${BUILD}/DEBIAN/prerm"

          # --- DEBIAN/postrm ------------------------------------------------------
          cat > "${BUILD}/DEBIAN/postrm" << 'EOF'
          #!/bin/bash
          set -e
          case "$1" in
              purge)
                  systemctl daemon-reload || true
                  ;;
          esac
          EOF
          chmod 755 "${BUILD}/DEBIAN/postrm"

          # --- Build --------------------------------------------------------------
          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

          echo "Built: ${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Build .mcpb
        run: |
          cd mcpb
          npm ci
          npm install -g @anthropic-ai/mcpb
          mcpb pack

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/dist/go-mcp-server_${{ steps.version.outputs.version }}_arm64.deb
            mcpb/*.mcpb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.APT_DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-mcp-server",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "arm64",
              "deb_url": "https://github.com/GOcontroll/go-mcp/releases/download/${{ github.ref_name }}/go-mcp-server_${{ steps.version.outputs.version }}_arm64.deb"
            }
